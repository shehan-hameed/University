<html>
  <head>
    <h1>JavaScript Events</h1>
  </head>

  <body>
    <script language="JavaScript" type="text/JavaScript">
      function clickevent() {
        document.write("Hello All, This is your firsy JavaScript Event");

      }
    </script>
    <input type="text" id="input" onkeydown="clickevent()" />
  </body>
</html>
